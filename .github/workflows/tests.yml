name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Security note: no user-controlled inputs (github.event.*) are used in `run:` steps.
# Matrix values (python-version) are internal config, not user input.

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install pytest
        run: python -m pip install --upgrade pip && pip install pytest

      - name: Run engine self-tests
        working-directory: engine
        run: |
          for module in signal_weights.py twitter_simulator.py slot.py verifier.py results_log.py hypothesis_generator.py ab_tester.py grok_playbook_miner.py; do
            echo "=== Running $module ==="
            python "$module"
          done

      - name: Run pytest
        run: python -m pytest tests/ -v

      - name: Smoke-test the evolutionary loop
        working-directory: engine
        run: |
          python evo_loop.py --iterations 5 --log /tmp/evo_ci.tsv
          test -s /tmp/evo_ci.tsv

      - name: Smoke-test with Grok warm-start (offline fallback)
        working-directory: engine
        run: |
          python evo_loop.py --iterations 3 --log /tmp/evo_ws.tsv \
            --warm-start memories_ai rerundotio physical_int
          test -s /tmp/evo_ws.tsv

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install ruff
        run: python -m pip install ruff
      - name: Lint engine
        run: ruff check engine/ tests/ || true
